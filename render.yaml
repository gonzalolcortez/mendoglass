services:
  - type: web
    name: sistema-backup
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-backup-db
          property: connectionString

databases:
  - name: sistema-backup-db
    databaseName: sistema_backup
    plan: free
