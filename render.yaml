services:
  - type: web
    name: sistema-backup
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --access-logfile - --error-logfile -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: TZ
        value: "America/Argentina/Buenos_Aires"
      - key: ARCA_CUIT
        value: ""
      - key: ARCA_CERT_PATH
        value: ""
      - key: ARCA_KEY_PATH
        value: ""
      - key: ARCA_PROD
        value: "false"
      - key: FACTURA_EMISOR_RAZON_SOCIAL
        value: ""
      - key: FACTURA_EMISOR_DIRECCION
        value: ""
      - key: FACTURA_EMISOR_CONDICION_IVA
        value: ""
      - key: FACTURA_EMISOR_IIBB
        value: ""
      - key: FACTURA_EMISOR_INICIO_ACTIVIDADES
        value: ""
      - key: FACTURA_EMISOR_TELEFONO
        value: ""
      - key: FACTURA_EMISOR_EMAIL
        value: ""
