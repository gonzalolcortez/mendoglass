{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="form-card">
      <form method="post">
        <div class="row g-3">
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Nombre *</label>
            <input type="text" name="nombre" class="form-control" required value="{{ entity.nombre if entity else '' }}">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Apellido *</label>
            <input type="text" name="apellido" class="form-control" required value="{{ entity.apellido if entity else '' }}">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Teléfono</label>
            <input type="text" name="telefono" class="form-control" value="{{ entity.telefono if entity else '' }}">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" value="{{ entity.email if entity else '' }}">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Dirección</label>
            <input type="text" name="direccion" class="form-control" value="{{ entity.direccion if entity else '' }}">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Notas</label>
            <textarea name="notas" class="form-control" rows="3">{{ entity.notas if entity else '' }}</textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>Guardar
          </button>
          <a href="{{ cancel_url }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
