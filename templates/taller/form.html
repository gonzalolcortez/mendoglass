{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block page_title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="form-card">
      <form method="post">
        <div class="section-title">Datos del Cliente</div>
        <div class="row g-3 mb-4">
          <div class="col-12">
            <label class="form-label fw-semibold">Cliente *</label>
            <select name="cliente_id" class="form-select" required>
              <option value="">Seleccionar cliente…</option>
              {% for c in clientes %}
              <option value="{{ c.id }}" {% if taller and taller.cliente_id == c.id %}selected{% endif %}>
                {{ c.nombre_completo }} {{ '· ' + c.telefono if c.telefono else '' }}
              </option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="section-title">Datos del Equipo</div>
        <div class="row g-3 mb-4">
          <div class="col-sm-4">
            <label class="form-label fw-semibold">Tipo de equipo</label>
            <input type="text" name="tipo_equipo" class="form-control" placeholder="Celular, PC, Tablet…"
                   value="{{ taller.tipo_equipo if taller else '' }}">
          </div>
          <div class="col-sm-4">
            <label class="form-label fw-semibold">Marca</label>
            <input type="text" name="marca" class="form-control" value="{{ taller.marca if taller else '' }}">
          </div>
          <div class="col-sm-4">
            <label class="form-label fw-semibold">Modelo</label>
            <input type="text" name="modelo" class="form-control" value="{{ taller.modelo if taller else '' }}">
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Descripción del problema *</label>
            <textarea name="descripcion_problema" class="form-control" rows="3" required>{{ taller.descripcion_problema if taller else '' }}</textarea>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Observaciones internas</label>
            <textarea name="observaciones" class="form-control" rows="2">{{ taller.observaciones if taller else '' }}</textarea>
          </div>
        </div>

        <div class="section-title">Detalles de la Orden</div>
        <div class="row g-3 mb-4">
          <div class="col-sm-4">
            <label class="form-label fw-semibold">Estado</label>
            <select name="estado" class="form-select">
              {% for val, label in estados %}
              <option value="{{ val }}" {% if taller and taller.estado == val %}selected{% elif not taller and val == 'recibido' %}selected{% endif %}>
                {{ label }}
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="col-sm-4">
            <label class="form-label fw-semibold">Técnico</label>
            <input type="text" name="tecnico" class="form-control" value="{{ taller.tecnico if taller else '' }}">
          </div>
          <div class="col-sm-4">
            <label class="form-label fw-semibold">Fecha estimada de entrega</label>
            <input type="date" name="fecha_estimada_entrega" class="form-control"
                   value="{{ taller.fecha_estimada_entrega.strftime('%Y-%m-%d') if taller and taller.fecha_estimada_entrega else '' }}">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Costo estimado ($)</label>
            <input type="number" name="costo_estimado" class="form-control" step="0.01" min="0"
                   value="{{ taller.costo_estimado if taller else '0' }}">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Costo final de reparación ($)
              <small class="text-muted">(0 = calculado por piezas+servicios)</small>
            </label>
            <input type="number" name="costo_reparacion" class="form-control" step="0.01" min="0"
                   value="{{ taller.costo_reparacion if taller else '0' }}">
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Guardar</button>
          <a href="{{ url_for('taller.index') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
