{% extends 'base.html' %}
{% block title %}Nuevo Movimiento{% endblock %}
{% block page_title %}Nuevo Movimiento de Caja{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="form-card">
      <form method="post">
        <div class="row g-3">
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Tipo *</label>
            <select name="tipo" class="form-select" required>
              <option value="ingreso">Ingreso</option>
              <option value="egreso">Egreso</option>
            </select>
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Categoría</label>
            <select name="referencia_tipo" class="form-select">
              <option value="otro">Otro</option>
              <option value="ajuste">Ajuste</option>
            </select>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Concepto *</label>
            <input type="text" name="concepto" class="form-control" required placeholder="Descripción del movimiento…">
          </div>
          <div class="col-sm-6">
            <label class="form-label fw-semibold">Monto ($) *</label>
            <input type="number" name="monto" class="form-control" step="0.01" min="0.01" required>
          </div>
          <div class="col-12">
            <label class="form-label fw-semibold">Notas</label>
            <textarea name="notas" class="form-control" rows="2"></textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Registrar</button>
          <a href="{{ url_for('caja.index') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
