{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="form-card">
      <p class="section-title">Datos fiscales del cliente</p>
      <form method="POST">
        <div class="row g-3">

          <div class="col-md-8">
            <label class="form-label fw-semibold">Nombre / Razón social <span class="text-danger">*</span></label>
            <input type="text" name="nombre" class="form-control"
                   value="{{ cliente.nombre if cliente else '' }}" required>
          </div>

          <div class="col-md-4">
            <label class="form-label fw-semibold">Condición IVA</label>
            <select name="condicion_iva" class="form-select" id="condicion-iva">
              {% for val, label in condiciones_iva %}
              <option value="{{ val }}"
                {% if cliente and cliente.condicion_iva == val %}selected{% endif %}>
                {{ label }}
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-4" id="cuit-field">
            <label class="form-label fw-semibold">CUIT</label>
            <input type="text" name="cuit" class="form-control"
                   value="{{ cliente.cuit if cliente and cliente.cuit else '' }}"
                   placeholder="20123456789">
            <div class="form-text">Sin guiones. Requerido para RI, Mono y Exento.</div>
          </div>

          <div class="col-md-8">
            <label class="form-label fw-semibold">Domicilio fiscal</label>
            <input type="text" name="direccion" class="form-control"
                   value="{{ cliente.direccion if cliente and cliente.direccion else '' }}">
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">E-mail</label>
            <input type="email" name="email" class="form-control"
                   value="{{ cliente.email if cliente and cliente.email else '' }}">
          </div>

          <div class="col-12 d-flex gap-2 justify-content-end">
            <a href="{{ url_for('facturacion.clientes') }}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-floppy me-1"></i>Guardar
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const condSelect = document.getElementById('condicion-iva');
  const cuitField = document.getElementById('cuit-field');
  function toggleCuit() {
    const val = condSelect.value;
    cuitField.style.display = (val === 'CF') ? 'none' : '';
  }
  condSelect.addEventListener('change', toggleCuit);
  toggleCuit();
</script>
{% endblock %}
